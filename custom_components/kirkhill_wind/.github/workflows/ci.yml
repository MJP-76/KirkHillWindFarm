name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install HA requirements
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant

      - name: Validate integration structure
        run: |
          python -m compileall custom_components/kirkhill_wind

      - name: Check manifest JSON
        run: |
          python -c "import json; json.load(open('custom_components/kirkhill_wind/manifest.json'))"
